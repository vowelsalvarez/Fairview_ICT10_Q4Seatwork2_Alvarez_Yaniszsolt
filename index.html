<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Classmates</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: lightblue;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      color: darkblue;
      text-align: center;
    }

    p {
      text-align: center;
      color: gray;
    }

    input {
      display: block;
      margin: 5px auto;
      padding: 8px;
      width: 300px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      background-color: darkblue;
      color: white;
      border: none;
      cursor: pointer;
    }

    #list {
      background-color: white;
      border: 2px solid darkblue;
      padding: 15px;
      width: 400px;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <h1>Grade 10  Classmates system  </h1>
  <p>Add and view your classmates easily</p>

  
  <input type="text" id="nameInput" placeholder="Name" />
  <input type="text" id="sectionInput" placeholder="Section" />
  <input type="text" id="subjectInput" placeholder="Favorite Subject" />
  <button onclick="addClassmate()">Add Classmate</button>
  <button onclick="showList()">Show List</button>

  
  <div id="list">
    <b>Classmate List:</b><br>
    <div id="output"></div>
  </div>

  <script>

   
    class Classmate {
      constructor(name, section, favorite_subject) {
        this.name = name;
        this.section = section;
        this.favorite_subject = favorite_subject;
      }

      introduce() {
        return "Hi! I am " + this.name + " from " + this.section + ". My favorite subject is " + this.favorite_subject + ".";
      }
    }

    
    var classmates = [
      new Classmate("Kristine", "Amethyst", "Math"),
      new Classmate("Jean", "Amethyst", "Science"),
      new Classmate("Hariette", "Amethyst", "English"),
      new Classmate("Jubilee", "Topaz", "History"),
      new Classmate("Vivian", "Topaz", "Filipino")
    ];

   
    function addClassmate() {
      var name = document.getElementById("nameInput").value;
      var section = document.getElementById("sectionInput").value;
      var subject = document.getElementById("subjectInput").value;

      if (name == "" || section == "" || subject == "") {
        alert("Please fill in all fields!");
        return;
      }

      var newClassmate = new Classmate(name, section, subject);
      classmates.push(newClassmate);

      document.getElementById("nameInput").value = "";
      document.getElementById("sectionInput").value = "";
      document.getElementById("subjectInput").value = "";

      showList();
    }

    
    function showList() {
      var output = document.getElementById("output");
      output.innerHTML = "";

      for (var i = 0; i < classmates.length; i++) {
        output.innerHTML += classmates[i].introduce() + "<br>";
      }
    }



  </script>

</body>
</html>
